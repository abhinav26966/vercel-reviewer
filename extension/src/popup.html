<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: ui-sans-serif, system-ui, sans-serif;
        background: #0d1117;
        color: #e6edf3;
        width: 320px;
        padding: 12px;
        margin: 0;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      label {
        display: block;
        font-size: 11px;
        color: #8b949e;
        margin-top: 8px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #010409;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #e6edf3;
        padding: 6px 8px;
        font-size: 12px;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      button {
        flex: 1;
        border: none;
        border-radius: 6px;
        padding: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      #start {
        background: #238636;
        color: #fff;
      }
      #stop {
        background: #8b2e2e;
        color: #fff;
      }
      #mark {
        background: #1f6feb;
        color: #fff;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #8b949e;
        min-height: 30px;
      }
      .rec {
        color: #ff7b72;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>🛡️ FlowGuard Recorder</h1>
    <label>API URL</label>
    <input id="apiUrl" placeholder="http://localhost:8787" />
    <label>API token (dashboard)</label>
    <input id="token" placeholder="dev token" />
    <label>Project ID</label>
    <input id="projectId" placeholder="prj_…" />
    <label>Flow name</label>
    <input id="flowName" placeholder="Buy & Rip Open a Pack" />
    <div class="row">
      <button id="start">● Record</button>
      <button id="stop">■ Stop & upload</button>
    </div>
    <div class="row">
      <button id="mark">✚ Mark assertion here</button>
    </div>
    <div id="status"></div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
