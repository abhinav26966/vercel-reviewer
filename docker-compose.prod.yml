# Full FlowGuard stack on one machine (self-hosting / the free hosted instance).
#   cp .env.production.example .env.production   # fill it in
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
# Everything (Postgres/Redis/MinIO) stays on the internal network; only the api,
# dashboard, and (optionally) Caddy publish ports. See SELF_HOSTING.md.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: flowguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.production}
      POSTGRES_DB: flowguard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowguard"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: flowguard
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?set in .env.production}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 flowguard \"$MINIO_PASSWORD\";
      mc mb -p local/flowguard-artifacts;
      mc mb -p local/flowguard-recordings;
      exit 0;
      "
    environment:
      MINIO_PASSWORD: ${MINIO_PASSWORD:?set in .env.production}

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["node", "/repo/packages/db/dist/migrate.js"]
    environment:
      DATABASE_URL: postgres://flowguard:${POSTGRES_PASSWORD}@postgres:5432/flowguard
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8787}:8787"
    environment: &backend-env
      DATABASE_URL: postgres://flowguard:${POSTGRES_PASSWORD}@postgres:5432/flowguard
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: flowguard
      S3_SECRET_ACCESS_KEY: ${MINIO_PASSWORD}
      S3_BUCKET: flowguard-artifacts
      S3_RECORDINGS_BUCKET: flowguard-recordings
      FLOWGUARD_MASTER_KEY: ${FLOWGUARD_MASTER_KEY:?set in .env.production}
      GITHUB_APP_ID: ${GITHUB_APP_ID:?set in .env.production}
      GITHUB_APP_PRIVATE_KEY_BASE64: ${GITHUB_APP_PRIVATE_KEY_BASE64:?set in .env.production}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:?set in .env.production}
      INFERENCE_API_KEY: ${INFERENCE_API_KEY:?set in .env.production}
      INFERENCE_ANALYZE_MODELS: ${INFERENCE_ANALYZE_MODELS:-}
      INFERENCE_GROUNDING_MODELS: ${INFERENCE_GROUNDING_MODELS:-}
      INFERENCE_JUDGE_MODELS: ${INFERENCE_JUDGE_MODELS:-}
      PUBLIC_API_URL: ${PUBLIC_API_URL:?set in .env.production}
      PUBLIC_DASHBOARD_URL: ${PUBLIC_DASHBOARD_URL:?set in .env.production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: apps/runner/Dockerfile
    restart: unless-stopped
    # Playwright needs a bigger /dev/shm than Docker's 64MB default
    shm_size: "1gb"
    environment: *backend-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:?set in .env.production}
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-3100}:3000"

  # Optional TLS reverse proxy: enable with --profile proxy after pointing DNS
  # at this machine and setting API_DOMAIN/DASHBOARD_DOMAIN. Caddy provisions
  # Let's Encrypt certificates automatically.
  caddy:
    image: caddy:2-alpine
    profiles: ["proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:-}
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN:-}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddydata:
